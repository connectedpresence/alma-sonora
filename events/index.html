<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ceremonies & Events · Alma Sonora Miami</title>
<meta name="description" content="Upcoming sound therapy ceremonies and gatherings by Alma Sonora in Miami — and an archive of past events.">
<link rel="canonical" href="https://alma-sonora.com/events/">
<meta name="theme-color" content="#f0d8b0">
<link rel="icon" type="image/png" sizes="32x32" href="../favicon-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="../favicon-icon.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://alma-sonora.com/events/">
<meta property="og:title" content="Ceremonies & Events · Alma Sonora Miami">
<meta property="og:description" content="Upcoming sound ceremonies in Miami — sound therapy, gongs, and deep rest.">
<meta property="og:image" content="https://alma-sonora.com/og-home.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=EB+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --sand-light:#f0d8b0; --sand:#e8d0a8; --oat:#e0c8a0; --linen:#f5ede0;
  --clay:#a17b5f; --clay-deep:#977356; --cocoa:#705040; --espresso:#4a382c;
  --arch:46% 46% 0 0 / 38% 38% 0 0;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'EB Garamond',serif;font-weight:500;font-size:1.1rem;line-height:1.7;color:var(--espresso);background:var(--sand-light)}
img{display:block;width:100%;height:100%;object-fit:cover}
a{color:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 6vw}
.eyebrow{font-size:.78rem;letter-spacing:.32em;text-transform:uppercase;color:var(--clay-deep);font-weight:600}
.display{font-family:'Italiana',serif;font-weight:400;line-height:1.08;color:var(--espresso)}
.btn{display:inline-block;font-size:.82rem;font-weight:600;letter-spacing:.26em;text-transform:uppercase;text-decoration:none;padding:.95rem 2.1rem;background:var(--clay);color:var(--linen);transition:background .35s ease}
.btn:hover{background:var(--cocoa)}
.btn.ghost{background:transparent;color:var(--cocoa);box-shadow:inset 0 0 0 1px var(--clay)}
.btn.ghost:hover{background:var(--clay);color:var(--linen)}

header{padding:1.6rem 0}
.nav{max-width:1180px;margin:0 auto;padding:0 6vw;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:.8rem;text-decoration:none}
.brand svg{width:34px;height:34px}
.brand span{font-family:'Italiana',serif;font-size:1.05rem;letter-spacing:.34em;text-transform:uppercase}
.nav a.home{font-size:.82rem;letter-spacing:.22em;text-transform:uppercase;text-decoration:none;font-weight:600;color:var(--cocoa)}

.head{padding:5rem 0 4rem;text-align:center}
.head .eyebrow{display:block;margin-bottom:1.4rem}
.head h1{font-size:clamp(2.6rem,5.4vw,4.2rem)}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:3rem;max-width:980px;margin:0 auto;padding-bottom:6rem}
.card{background:var(--linen);box-shadow:0 0 0 1px rgba(151,115,86,.3);display:flex;flex-direction:column}
.card .photo{aspect-ratio:16/9;overflow:hidden;background:var(--oat)}
.card .photo.placeholder{display:flex;align-items:center;justify-content:center}
.card .photo.placeholder svg{width:64px;height:64px;opacity:.6}
.card .body{padding:2rem 2rem 2.4rem;display:flex;flex-direction:column;flex:1}
.card .date{font-size:.78rem;letter-spacing:.28em;text-transform:uppercase;color:var(--clay-deep);font-weight:600;margin-bottom:.9rem}
.card h2{font-family:'Italiana',serif;font-weight:400;font-size:1.8rem;line-height:1.15;margin-bottom:.4rem}
.card .sub{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--cocoa);margin-bottom:1.1rem}
.card p{color:var(--cocoa);font-size:1rem;flex:1;margin-bottom:1.6rem}
.card .meta{font-size:.9rem;color:var(--clay-deep);margin-bottom:1.6rem}
.badge{display:inline-block;font-size:.7rem;letter-spacing:.24em;text-transform:uppercase;font-weight:600;padding:.3rem .8rem;margin-bottom:1rem;background:var(--sand);color:var(--cocoa);align-self:flex-start}

.past{background:var(--linen);padding:5.5rem 0 7rem}
.past h2{font-size:clamp(2rem,4vw,2.8rem);text-align:center;margin-bottom:3.2rem}
.past-row{display:flex;align-items:baseline;justify-content:space-between;gap:2rem;padding:1.6rem 0;border-top:1px solid rgba(161,123,95,.35);max-width:760px;margin:0 auto;text-decoration:none;transition:opacity .3s}
.past-row:hover{opacity:.7}
.past-row:last-child{border-bottom:1px solid rgba(161,123,95,.35)}
.past-row .t{font-family:'Italiana',serif;font-size:1.4rem}
.past-row .d{font-size:.85rem;letter-spacing:.22em;text-transform:uppercase;color:var(--clay-deep);font-weight:600;white-space:nowrap}
@media(max-width:600px){.past-row{flex-direction:column;gap:.3rem}}

footer{background:var(--espresso);color:var(--linen);padding:4.5rem 0 3rem;text-align:center}
footer svg{width:46px;height:46px;margin:0 auto 1.4rem;color:var(--sand)}
footer .name{font-family:'Italiana',serif;font-size:1.2rem;letter-spacing:.34em;text-transform:uppercase;display:block;margin-bottom:1.6rem}
footer a{color:var(--linen);text-decoration:none;opacity:.85}
.foot-links{display:flex;justify-content:center;gap:2.5rem;flex-wrap:wrap;margin-bottom:2.5rem;font-size:.95rem}
.foot-base{border-top:1px solid rgba(245,237,224,.18);padding-top:2rem;font-size:.85rem;opacity:.7}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <g id="lotus" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" color="var(--cocoa)">
      <path d="M0,38 C-14,28 -16,6 0,-12 C16,6 14,28 0,38 Z"/>
      <path d="M0,38 C-24,30 -32,8 -22,-16 C-6,-6 -2,16 0,38 Z"/>
      <path d="M0,38 C24,30 32,8 22,-16 C6,-6 2,16 0,38 Z"/>
      <path d="M0,38 C-34,34 -46,14 -42,-8 C-22,-2 -10,18 0,38 Z"/>
      <path d="M0,38 C34,34 46,14 42,-8 C22,-2 10,18 0,38 Z"/>
      <path d="M0,38 C-42,40 -52,26 -54,8 C-34,10 -16,24 0,38 Z"/>
      <path d="M0,38 C42,40 52,26 54,8 C34,10 16,24 0,38 Z"/>
    </g>
  </defs>
</svg>

<header>
  <nav class="nav">
    <a class="brand" href="/">
      <svg viewBox="-50 -50 100 100" aria-hidden="true"><use href="#lotus"/></svg>
      <span>Alma Sonora</span>
    </a>
    <a class="home" href="/">← Home</a>
  </nav>
</header>

<section class="head">
  <span class="eyebrow">Alma Sonora · Miami</span>
  <h1 class="display">Ceremonies &amp; Events</h1>
</section>

<div class="wrap">
  <div class="cards" id="upcoming"><!-- populated from /events.json --></div>
</div>

<section class="past">
  <div class="wrap">
    <h2 class="display">Past ceremonies</h2>
    <div id="past"><!-- populated from /events.json --></div>
  </div>
</section>

<footer>
  <svg viewBox="-58 -50 116 100" aria-hidden="true"><use href="#lotus"/></svg>
  <span class="name">Alma Sonora</span>
  <div class="foot-links">
    <a href="/">alma-sonora.com</a>
    <a href="https://instagram.com/alma.sonora16">@alma.sonora16</a>
    <a href="https://wa.me/18097787500">WhatsApp</a>
  </div>
  <div class="foot-base">© 2026 Alma Sonora · Miami, FL</div>
</footer>

<script>
fetch('/events.json').then(r=>r.json()).then(data=>{
  const evs = data.events||[];
  const up = evs.filter(e=>e.status==='open'||e.status==='announcing'||e.status==='sold_out')
    .sort((a,b)=>(a.date||'9999')<(b.date||'9999')?-1:1);
  const past = evs.filter(e=>e.status==='past')
    .sort((a,b)=>a.date<b.date?1:-1);

  const upEl = document.getElementById('upcoming');
  if(!up.length){
    upEl.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--cocoa)">Our next ceremony is being prepared. <a href="https://wa.me/18097787500">Write to us</a> to hear first.</p>';
  }
  up.forEach(e=>{
    const badge = e.status==='announcing' ? '<span class="badge">Announcing</span>'
               : e.status==='sold_out' ? '<span class="badge">Sold out</span>' : '';
    const photo = e.image
      ? '<div class="photo"><img src="'+e.image+'" alt=""></div>'
      : '<div class="photo placeholder"><svg viewBox="-58 -50 116 100"><use href="#lotus"/></svg></div>';
    const meta = [e.date_display, e.time_display, e.venue].filter(Boolean).join(' · ');
    const cta = e.status==='announcing' ? 'Hear about it first'
             : e.status==='sold_out' ? 'Join the waitlist' : 'See the event & reserve';
    const card = document.createElement('article');
    card.className='card';
    card.innerHTML = photo + '<div class="body">' + badge +
      '<span class="date">'+meta+'</span>'+
      '<h2>'+e.title+'</h2>'+
      (e.subtitle?'<p class="sub">'+e.subtitle+'</p>':'')+
      '<p>'+(e.blurb||'')+'</p>'+
      (e.price_display?'<div class="meta">'+e.price_display+' USD'+(e.price_note?' · '+e.price_note:'')+'</div>':'')+
      '<a class="btn" href="'+e.url+'">'+cta+'</a></div>';
    upEl.appendChild(card);
  });

  const pastEl = document.getElementById('past');
  past.forEach(e=>{
    const a = document.createElement('a');
    a.className='past-row'; a.href=e.url;
    a.innerHTML = '<span class="t">'+e.title+(e.subtitle?' · <em style="font-family:\'Cormorant Garamond\',serif;font-size:1.1rem;color:var(--cocoa)">'+e.subtitle+'</em>':'')+'</span><span class="d">'+e.date_display+'</span>';
    pastEl.appendChild(a);
  });
}).catch(()=>{
  document.getElementById('upcoming').innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--cocoa)">See our next ceremony: <a href="/events/descanso-del-padre/">El Descanso del Padre · June 20</a></p>';
});
</script>

</body>
</html>
